{% extends 'base.html' %}

{% block title %}Crear Nueva Nota | PyObsidian{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px; margin: 2rem auto; padding: 1rem;">
    <h2>📝 Crear Nueva Nota</h2>
    <p>Escribe tu nota usando formato Markdown.</p>

    <form action="{{ url_for('crear_nota') }}" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
        
        <div>
            <label for="titulo" style="font-weight: bold;">Título de la nota:</label><br>
            <input type="text" id="titulo" name="titulo" required placeholder="Ej: Resumen de Bases de Datos" style="width: 100%; padding: 0.5rem;">
        </div>

        <div>
            <label for="contenido_raw" style="font-weight: bold;">Contenido (Markdown):</label><br>
            <textarea id="contenido_raw" name="contenido_raw" rows="12" required placeholder="# Tema principal&#10;&#10;Escribe aquí tus apuntes..." style="width: 100%; padding: 0.5rem; font-family: monospace;"></textarea>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" style="padding: 0.5rem 1rem; background-color: #28a745; color: white; border: none; cursor: pointer; font-weight: bold;">💾 Guardar Nota</button>
            <a href="{{ url_for('ver_notas') }}" style="padding: 0.5rem 1rem; background-color: #6c757d; color: white; text-decoration: none; font-weight: bold;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

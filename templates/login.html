{% extends "base.html" %}

{% block content %}
<style>
    /* Tema Oscuro "PyObsidian" */
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .auth-container {
        background-color: #1e1e24; /* Gris oscuro profundo */
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 400px;
        color: #e0e0e0;
        border: 1px solid #2d2d35;
    }
    .auth-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #9d7cff; /* Morado estilo Obsidian */
        font-weight: 600;
        letter-spacing: 0.5px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: #a0a0b0;
    }
    .form-group input {
        width: 100%;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #3f3f4e;
        background-color: #121216;
        color: #ffffff;
        font-size: 1rem;
        transition: all 0.3s ease;
        box-sizing: border-box; /* Evita que el input se salga del div */
    }
    .form-group input:focus {
        outline: none;
        border-color: #9d7cff;
        box-shadow: 0 0 0 3px rgba(157, 124, 255, 0.2);
    }
    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: #9d7cff;
        color: #ffffff;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
        margin-top: 10px;
    }
    .btn-submit:hover {
        background-color: #8b63ff;
    }
    .btn-submit:active {
        transform: scale(0.98);
    }
    .auth-links {
        text-align: center;
        margin-top: 25px;
        font-size: 0.9rem;
        color: #a0a0b0;
    }
    .auth-links a {
        color: #9d7cff;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
    }
    .auth-links a:hover {
        color: #b499ff;
        text-decoration: underline;
    }
    .alertas-flask {
        list-style: none;
        padding: 0;
        margin-bottom: 20px;
    }
    .alert-item {
        background-color: rgba(244, 67, 54, 0.1);
        color: #ff6b6b;
        padding: 12px;
        border-radius: 6px;
        border-left: 4px solid #ff6b6b;
        font-size: 0.9rem;
        margin-bottom: 10px;
        font-weight: 500;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-container">
        <h2>Entrar a PyObsidian</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="alertas-flask">
                {% for message in messages %}
                    <li class="alert-item">{{ message }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" name="username" placeholder="Tu alias..." required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Entrar a la Bóveda</button>
        </form>

        <div class="auth-links">
            <p>¿No eres administrador? <a href="{{ url_for('register') }}">Regístrate aquí</a></p>
        </div>
    </div>
</div>
{% endblock %}

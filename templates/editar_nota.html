{% extends 'base.html' %}

{% block title %}Editar: {{ nota.titulo }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 800px; margin: 2rem auto; padding: 1rem;">
    <h2>✏️ Editando: {{ nota.titulo }}</h2>
    
    <form action="{{ url_for('editar_nota', id_nota=nota.id_documento) }}" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">

        <div>
            <label for="contenido_raw" style="font-weight: bold;">Contenido (Markdown):</label><br>
            <textarea id="contenido_raw" name="contenido_raw" rows="15" required style="width: 100%; padding: 0.5rem; font-family: monospace;">{{ nota.contenido_raw }}</textarea>
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" style="padding: 0.5rem 1rem; background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold;">🔄 Actualizar Cambios</button>
            <a href="{{ url_for('ver_nota_individual', id_nota=nota.id_documento) }}" style="padding: 0.5rem 1rem; background-color: #6c757d; color: white; text-decoration: none; font-weight: bold;">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
